services:
  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  app:
    build: .
    ports: ["8501:8501"]
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DB_PATH: /app/data/conversations.db
    volumes:
      - ./data:/app/data
    depends_on: [qdrant]

volumes:
  qdrant_data:
