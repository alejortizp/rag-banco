services:
  qdrant:
    image: qdrant/qdrant:v1.10.1
    # Sin autenticación: aceptable solo para entorno local de la prueba (documentado en README como limitación)
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    ports: ["8501:8501"]
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DB_PATH: /app/data/conversations.db
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
